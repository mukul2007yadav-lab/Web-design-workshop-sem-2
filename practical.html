<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
    body{
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
}

input{
    padding: 8px;
    margin: 10px;
}

button{
    padding: 10px 20px;
    background-color: green;
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
<div>
    <h2><center> INTEREST CALCULATOR</center></h2>
        </div><br><br>
    <label>Principal</label>
    <input type="number" id="principal"><br>
    <label>Rate(%)</label>
    <input type="number" id="rate"><br>
    <label>Time</label>
    <input type="number" id="time"><br>
    <button onclick="CalculateSI()">Calculate.</button>
    <h3 id="result"></h3>
    <script>
        function CalculateSI()
        {
            let p=document.getElementById("principal").value;
            let r=document.getElementById("rate").value;
            let t=document.getElementById("time").value;
            let si=(p*r*t)/100;
            document.getElementById("result").innerHTML="Simple Interest="+si;

        }
    </script>
</body>
</html>
